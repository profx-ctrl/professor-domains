<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Professor Domains</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }
    .login-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .login-card {
      background: #111;
      border: 1px solid #1c1c1c;
      border-radius: 16px;
      padding: 36px 32px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .login-card h1 { font-size: 1.3rem; margin-bottom: 6px; }
    .login-card p { color: #555; font-size: 0.85rem; margin-bottom: 24px; }
    input {
      width: 100%;
      background: #0d0d0d;
      border: 1px solid #1e1e1e;
      color: #fff;
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #e63946; }
    input::placeholder { color: #333; }
    .btn {
      width: 100%;
      background: #e63946;
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background 0.2s;
    }
    .btn:hover { background: #c1121f; }
    .error-msg {
      color: #e63946;
      font-size: 0.82rem;
      margin-top: 10px;
      display: none;
    }
    .dashboard { display: none; }
    .dash-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 32px;
      border-bottom: 1px solid #1a1a1a;
      background: #0a0a0a;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .dash-logo {
      font-size: 1.1rem;
      font-weight: 800;
      color: #e63946;
    }
    .logout-btn {
      background: #1a1a1a;
      color: #aaa;
      border: 1px solid #222;
      padding: 7px 16px;
      border-radius: 7px;
      font-size: 0.82rem;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    .logout-btn:hover { background: #222; color: #fff; }
    .dash-content { padding: 28px 32px; }
    .stats-row {
      display: flex;
      gap: 16px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: #111;
      border: 1px solid #1c1c1c;
      border-radius: 12px;
      padding: 20px 24px;
      flex: 1;
      min-width: 140px;
    }
    .stat-card .num {
      font-size: 2rem;
      font-weight: 800;
      color: #e63946;
    }
    .stat-card .lbl {
      color: #555;
      font-size: 0.82rem;
      margin-top: 4px;
    }
    .section-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: #eee;
    }
    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: #111;
      border: 1px solid #222;
      color: #aaa;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.82rem;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    .filter-btn.active {
      background: #e6394620;
      border-color: #e63946;
      color: #e63946;
    }
    .table-wrap {
      background: #111;
      border: 1px solid #1c1c1c;
      border-radius: 12px;
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    thead {
      background: #161616;
      border-bottom: 1px solid #1c1c1c;
    }
    th {
      padding: 12px 16px;
      text-align: left;
      color: #555;
      font-weight: 600;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    td {
      padding: 12px 16px;
      border-bottom: 1px solid #161616;
      color: #ccc;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #141414; }
    .status-badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .status-pending {
      background: #f59e0b20;
      color: #f59e0b;
      border: 1px solid #f59e0b40;
    }
    .status-active {
      background: #10b98120;
      color: #10b981;
      border: 1px solid #10b98140;
    }
    .status-rejected {
      background: #e6394620;
      color: #e63946;
      border: 1px solid #e6394640;
    }
    .action-btn {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: 'Inter', sans-serif;
      margin-right: 4px;
      transition: opacity 0.2s;
    }
    .action-btn:hover { opacity: 0.8; }
    .approve-btn { background: #10b98120; color: #10b981; border: 1px solid #10b98140; }
    .reject-btn { background: #e6394620; color: #e63946; border: 1px solid #e6394640; }
    .delete-btn { background: #33333320; color: #888; border: 1px solid #33333340; }
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: #444;
    }
    .empty-state div { font-size: 2rem; margin-bottom: 10px; }
    .subdomain-cell { color: #fff; font-weight: 600; }
    .subdomain-cell span { color: #555; font-weight: 400; }
    @media (max-width: 600px) {
      .dash-content { padding: 20px 16px; }
      .dash-nav { padding: 16px; }
      th:nth-child(3), td:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-wrap" id="loginWrap">
    <div class="login-card">
      <div style="font-size:2rem;margin-bottom:12px">🎭</div>
      <h1>Admin Access</h1>
      <p>Professor's eyes only</p>
      <input type="password" id="passInput" placeholder="Enter admin password" />
      <button class="btn" onclick="checkPass()">Enter The Vault</button>
      <div class="error-msg" id="errMsg">❌ Wrong password. Try again.</div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">
    <div class="dash-nav">
      <div class="dash-logo">🎭 Professor Admin</div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="dash-content">
      <div class="stats-row">
        <div class="stat-card">
          <div class="num" id="totalCount">0</div>
          <div class="lbl">Total Domains</div>
        </div>
        <div class="stat-card">
          <div class="num" id="pendingCount">0</div>
          <div class="lbl">Pending</div>
        </div>
        <div class="stat-card">
          <div class="num" id="activeCount">0</div>
          <div class="lbl">Active</div>
        </div>
        <div class="stat-card">
          <div class="num" id="rejectedCount">0</div>
          <div class="lbl">Rejected</div>
        </div>
      </div>

      <div class="section-title">All Registrations</div>

      <div class="filter-row">
        <button class="filter-btn active" onclick="filterDomains('all', this)">All</button>
        <button class="filter-btn" onclick="filterDomains('pending', this)">Pending</button>
        <button class="filter-btn" onclick="filterDomains('active', this)">Active</button>
        <button class="filter-btn" onclick="filterDomains('rejected', this)">Rejected</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Subdomain</th>
              <th>Email</th>
              <th>Points To</th>
              <th>Status</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="6"><div class="empty-state"><div>⏳</div>Loading...</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const { createClient } = supabase;
    const db = createClient(
      'https://ksremotcyngdadfaakgk.supabase.co',
      'sb_publishable_UvuTgI-fAeCv-Qz1dwtOTw_iTJJG0R0'
    );

    const ADMIN_PASS = 'professor2024';
    let allDomains = [];

    function checkPass() {
      const val = document.getElementById('passInput').value;
      if (val === ADMIN_PASS) {
        document.getElementById('loginWrap').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadDomains();
      } else {
        document.getElementById('errMsg').style.display = 'block';
      }
    }

    document.getElementById('passInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') checkPass();
    });

    function logout() {
      document.getElementById('loginWrap').style.display = 'flex';
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('passInput').value = '';
    }

    async function loadDomains() {
      const { data, error } = await db
        .from('domains')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) { console.error(error); return; }

      allDomains = data || [];
      renderTable(allDomains);
      updateStats(allDomains);
    }

    function updateStats(data) {
      document.getElementById('totalCount').textContent = data.length;
      document.getElementById('pendingCount').textContent = data.filter(d => d.status === 'pending').length;
      document.getElementById('activeCount').textContent = data.filter(d => d.status === 'active').length;
      document.getElementById('rejectedCount').textContent = data.filter(d => d.status === 'rejected').length;
    }

    function filterDomains(status, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const filtered = status === 'all' ? allDomains : allDomains.filter(d => d.status === status);
      renderTable(filtered);
    }

    function renderTable(data) {
      const tbody = document.getElementById('tableBody');
      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div>🎭</div>No domains found</div></td></tr>';
        return;
      }
      tbody.innerHTML = data.map(d => `
        <tr>
          <td class="subdomain-cell">${d.subdomain}<span>.is-a.dev</span></td>
          <td>${d.email}</td>
          <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.record_value}</td>
          <td><span class="status-badge status-${d.status}">${d.status}</span></td>
          <td>${new Date(d.created_at).toLocaleDateString()}</td>
          <td>
            ${d.status !== 'active' ? `<button class="action-btn approve-btn" onclick="updateStatus('${d.id}', 'active')">✓ Approve</button>` : ''}
            ${d.status !== 'rejected' ? `<button class="action-btn reject-btn" onclick="updateStatus('${d.id}', 'rejected')">✗ Reject</button>` : ''}
            <button class="action-btn delete-btn" onclick="deleteDomain('${d.id}')">🗑</button>
          </td>
        </tr>
      `).join('');
    }

    async function updateStatus(id, status) {
      await db.from('domains').update({ status }).eq('id', id);
      loadDomains();
    }

    async function deleteDomain(id) {
      if (!confirm('Delete this domain?')) return;
      await db.from('domains').delete().eq('id', id);
      loadDomains();
    }
  </script>

</body>
</html>
